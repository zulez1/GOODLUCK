<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PAYG INSURE | PRO EDITION</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-dark: #020205;
            --accent-pink: #FF007F;
            --accent-blue: #00F2FF;
            --text-white: #FFFFFF;
            --btn-disabled: #555555; /* Цвет неактивной кнопки */
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; background-color: var(--bg-dark); color: var(--text-white);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #0d0d2b 0%, #020205 100%);
            touch-action: none; -webkit-user-select: none;
        }

        @keyframes wheel-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes btn-pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 10px 40px rgba(255, 0, 127, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 15px 50px rgba(255, 0, 127, 0.7); }
        }

        .container { position: relative; text-align: center; z-index: 10; width: 100%; display: flex; flex-direction: column; align-items: center; }
        
        .header h1 { font-size: 58px; margin: 0; font-weight: 900; letter-spacing: -1px; }
        .header p { color: var(--accent-pink); text-transform: uppercase; letter-spacing: 6px; font-size: 14px; margin: 8px 0 0; font-weight: 700; }

        .wheel-outer { 
            position: relative; width: 620px; height: 620px; margin: 40px auto 0; 
            animation: wheel-float 6s ease-in-out infinite; 
        }

        .marker {
            position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 25px solid transparent; border-right: 25px solid transparent;
            border-top: 50px solid #FFF; z-index: 30; filter: drop-shadow(0 0 15px rgba(255,255,255,0.6));
        }

        canvas#wheel { width: 100%; height: 100%; border-radius: 50%; border: 15px solid #000; transition: transform 6s cubic-bezier(0.1, 0, 0, 1); }

        .spin-btn {
            margin-top: 45px; background: var(--accent-pink); color: white; border: none; padding: 25px 90px;
            font-size: 34px; font-weight: 900; border-radius: 100px; cursor: pointer;
            text-transform: uppercase;
            animation: btn-pulse 2s infinite ease-in-out;
            transition: all 0.3s ease;
        }
        
        /* Стили для неактивной кнопки */
        .spin-btn:disabled { 
            background: var(--btn-disabled) !important; 
            box-shadow: none !important; 
            animation: none !important; 
            transform: scale(0.95);
            color: #aaa;
            cursor: default;
        }

        .result-box { margin-top: 25px; height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .result-title { font-size: 42px; font-weight: 900; color: var(--accent-blue); text-transform: uppercase; letter-spacing: 1px; margin: 0; display: none; text-shadow: 0 0 15px rgba(0, 242, 255, 0.5); }
        .result-prize { font-size: 42px; font-weight: 900; color: #FFFFFF; text-transform: uppercase; margin-top: 5px; display: none; text-shadow: 0 2px 10px rgba(0,0,0,0.5); animation: prize-pop 0.6s cubic-bezier(0.17, 0.89, 0.32, 1.49); }

        @keyframes prize-pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* АДМИНКА */
        #adminPanel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 10, 0.99); z-index: 1000; display: none; flex-direction: column; align-items: center; padding: 40px; overflow-y: auto; }
        .admin-card { width: 100%; max-width: 800px; background: #16161f; padding: 30px; border-radius: 20px; margin-bottom: 25px; border: 1px solid #333; }
        .history-table { width: 100%; border-collapse: collapse; margin-top: 15px; color: #eee; }
        .history-table th { text-align: left; padding: 10px; color: var(--accent-blue); border-bottom: 2px solid #333; }
        .history-table td { padding: 10px; border-bottom: 1px solid #222; }
        .sector-item { display: flex; gap: 10px; margin-bottom: 10px; }
        input { background: #000; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 8px; width: 100%; }
        .btn { padding: 12px 25px; border-radius: 10px; font-weight: 800; border: none; cursor: pointer; text-transform: uppercase; }
        .admin-trigger { position: fixed; bottom: 0; right: 0; width: 80px; height: 80px; background: transparent; border: none; z-index: 5; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 id="vTitle">PAYG INSURE</h1>
        <p id="vSub">SAFE MODE ACTIVATED</p>
    </div>
    
    <div class="wheel-outer" id="wheelCont">
        <div class="marker"></div>
        <canvas id="wheel" width="1200" height="1200"></canvas>
    </div>

    <button class="spin-btn" id="spinBtn">ПОЕХАЛИ!</button>

    <div class="result-box">
        <div class="result-title" id="resT">ВЫИГРЫШ:</div>
        <div class="result-prize" id="resP"></div>
    </div>
</div>

<audio id="winAudio" src="https://actions.google.com/sounds/v1/foley/brass_fanfare_short.ogg" preload="auto"></audio>

<button class="admin-trigger" id="openAdmin"></button>

<div id="adminPanel">
    <h1 style="color:#FFF">СИСТЕМА УПРАВЛЕНИЯ</h1>
    <div class="admin-card">
        <h2>Редактор призов</h2>
        <div id="secList"></div>
        <button class="btn" id="addBtn" style="background:var(--accent-blue); color:#000; margin-top:10px">+ Добавить</button>
    </div>
    <div class="admin-card">
        <h2>История прокрутов</h2>
        <table class="history-table" id="logTable">
            <thead><tr><th>№</th><th>Время</th><th>Приз</th></tr></thead>
            <tbody></tbody>
        </table>
        <button class="btn" onclick="clearLogs()" style="background:#444; color:#fff; margin-top:10px">Очистить историю</button>
    </div>
    <div style="display:flex; gap:10px">
        <button class="btn" id="saveBtn" style="background:#28a745; color:#fff">СОХРАНИТЬ ВСЁ</button>
        <button class="btn" id="closeAdmin" style="background:#FFF; color:#000">ЗАКРЫТЬ</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const winAudio = document.getElementById('winAudio');
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    const initial = {
        mainTitle: "PAYG INSURE", subTitle: "SAFE MODE ACTIVATED",
        prizes: [
            { name: "ТЫЩА МИНУТ", chance: 1 }, { name: "СТИКЕРПАК", chance: 35 },
            { name: "ПУТЬ ЗА НОЛЬ", chance: 25 }, { name: "ДВОЙНОЙ СЧЕТ", chance: 10 },
            { name: "ТВОЙ АМУЛЕТ", chance: 2 }, { name: "ДРУЖСКИЙ СЕЙВ", chance: 7 },
            { name: "ЕЩЕ КРУЖОК", chance: 5 }, { name: "ДЕНЬ БЕЗ ГРАНИЦ", chance: 15 }
        ]
    };

    let config = JSON.parse(localStorage.getItem('wheelConfig')) || initial;
    let isSpinning = false;
    let totalRot = 0;
    let lastIdx = -1;

    function playTick() {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = 'sine'; o.frequency.setValueAtTime(600, audioCtx.currentTime);
        o.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.04);
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + 0.04);
    }

    // НОВЫЙ УЛУЧШЕННЫЙ ЗВУК ВЗРЫВА
    function playExplosion() {
        const duration = 0.5;
        const noise = audioCtx.createBufferSource();
        const bufferSize = audioCtx.sampleRate * duration;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
        noise.buffer = buffer;

        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(800, audioCtx.currentTime);
        filter.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);

        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.6, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

        noise.connect(filter); filter.connect(g); g.connect(audioCtx.destination);
        noise.start();
    }

    function draw() {
        document.getElementById('vTitle').textContent = config.mainTitle;
        document.getElementById('vSub').textContent = config.subTitle;
        const cx = 600, cy = 600, r = 580;
        ctx.clearRect(0,0,1200,1200);
        const arc = (2 * Math.PI) / config.prizes.length;
        const matrix = new WebKitCSSMatrix(window.getComputedStyle(canvas).transform);
        const currentAngleRad = Math.atan2(matrix.b, matrix.a);

        config.prizes.forEach((p, i) => {
            const start = i * arc - (Math.PI / 2) - (arc / 2);
            ctx.beginPath();
            ctx.fillStyle = (i % 2 === 0) ? "#08080A" : "#121218";
            ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, start, start + arc); ctx.fill();
            ctx.strokeStyle = (i % 2 === 0) ? "#FF007F" : "#00F2FF";
            ctx.lineWidth = 10; ctx.stroke();

            const centerAngle = start + arc / 2 + currentAngleRad;
            const norm = Math.atan2(Math.sin(centerAngle), Math.cos(centerAngle));
            const active = Math.abs(norm + Math.PI/2) < (arc / 2);
            if (active && i !== lastIdx) { lastIdx = i; if (isSpinning) playTick(); }

            ctx.save();
            ctx.translate(cx, cy); ctx.rotate(start + arc / 2);
            ctx.textAlign = "right"; ctx.textBaseline = "middle";
            ctx.fillStyle = active ? "#FFF" : "rgba(255,255,255,0.2)";
            ctx.font = "900 38px sans-serif";
            ctx.fillText(p.name, r - 85, 0); ctx.restore();
        });
        ctx.beginPath(); ctx.arc(cx, cy, 75, 0, Math.PI*2); ctx.fillStyle="#000"; ctx.fill();
        ctx.strokeStyle="#FFF"; ctx.lineWidth=6; ctx.stroke();
    }

    document.getElementById('spinBtn').onclick = () => {
        if (isSpinning) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        isSpinning = true;
        const btn = document.getElementById('spinBtn');
        btn.disabled = true; // СТАНОВИТСЯ СЕРОЙ
        
        document.getElementById('wheelCont').style.animation = 'none';
        document.getElementById('resT').style.display = 'none';
        document.getElementById('resP').style.display = 'none';

        const totalChance = config.prizes.reduce((a, b) => a + b.chance, 0);
        const rand = Math.random() * totalChance;
        let cum = 0; let winIdx = 0;
        for (let i = 0; i < config.prizes.length; i++) {
            cum += config.prizes[i].chance;
            if (rand <= cum) { winIdx = i; break; }
        }

        const step = 360 / config.prizes.length;
        totalRot += 3960 + (360 - (winIdx * step)) + (360 - (totalRot % 360));
        canvas.style.transform = `rotate(${totalRot}deg)`;

        setTimeout(() => {
            isSpinning = false;
            btn.disabled = false; // ВОЗВРАЩАЕТСЯ В АКТИВНЫЙ ВИД
            document.getElementById('wheelCont').style.animation = 'wheel-float 6s ease-in-out infinite';
            
            document.getElementById('resP').textContent = config.prizes[winIdx].name;
            document.getElementById('resT').style.display = 'block';
            document.getElementById('resP').style.display = 'block';
            
            // ФИНАЛЬНЫЕ ЭФФЕКТЫ
            playExplosion();
            setTimeout(() => winAudio.play(), 50);
            confetti({ particleCount: 200, spread: 90, origin: { y: 0.6 }, colors: ['#FF007F', '#00F2FF', '#FFFFFF'] });
            
            const logs = JSON.parse(localStorage.getItem('wheelLogs')) || [];
            logs.push({ id: logs.length + 1, prize: config.prizes[winIdx].name, time: new Date().toLocaleTimeString() });
            localStorage.setItem('wheelLogs', JSON.stringify(logs));
        }, 6000);
    };

    function renderEdit() {
        const list = document.getElementById('secList');
        list.innerHTML = '';
        config.prizes.forEach((p, i) => {
            const d = document.createElement('div'); d.className = 'sector-item';
            d.innerHTML = `<input type="text" style="flex:3" value="${p.name}" class="i-n">
                           <input type="number" style="flex:1" value="${p.chance}" class="i-c">
                           <button onclick="delS(${i})" style="background:#dc3545; color:#fff; border:none; border-radius:5px; width:40px">✕</button>`;
            list.appendChild(d);
        });
        const logs = JSON.parse(localStorage.getItem('wheelLogs')) || [];
        document.querySelector('#logTable tbody').innerHTML = logs.slice().reverse().map(l => `<tr><td>${l.id}</td><td>${l.time}</td><td>${l.prize}</td></tr>`).join('');
    }

    window.delS = (i) => { config.prizes.splice(i, 1); renderEdit(); };
    window.clearLogs = () => { if(confirm("Очистить?")) { localStorage.removeItem('wheelLogs'); renderEdit(); } };
    document.getElementById('addBtn').onclick = () => { config.prizes.push({name:"ПРИЗ", chance:10}); renderEdit(); };
    document.getElementById('saveBtn').onclick = () => {
        const ns = document.querySelectorAll('.i-n'), cs = document.querySelectorAll('.i-c');
        config.prizes = [];
        ns.forEach((n, i) => config.prizes.push({ name: n.value, chance: parseFloat(cs[i].value) || 0 }));
        localStorage.setItem('wheelConfig', JSON.stringify(config));
        location.reload();
    };
    document.getElementById('openAdmin').onclick = () => { renderEdit(); document.getElementById('adminPanel').style.display = 'flex'; };
    document.getElementById('closeAdmin').onclick = () => document.getElementById('adminPanel').style.display = 'none';

    function loop() { draw(); requestAnimationFrame(loop); }
    loop();
</script>
</body>
</html>
