<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PAYG INSURE | ULTIMATE WHEEL</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-dark: #020205;
            --accent-pink: #FF007F;
            --accent-blue: #00F2FF;
            --text-white: #FFFFFF;
            --btn-disabled: #444444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; background-color: var(--bg-dark); color: var(--text-white);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow-y: auto; padding: 20px;
            background-image: radial-gradient(circle at 50% 50%, #0d0d2b 0%, #020205 100%);
        }

        /* Анимации */
        @keyframes wheel-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes btn-pulse { 0%, 100% { transform: scale(1); box-shadow: 0 10px 40px rgba(255, 0, 127, 0.4); } 50% { transform: scale(1.05); box-shadow: 0 15px 50px rgba(255, 0, 127, 0.7); } }
        @keyframes prize-pop {
            0% { transform: scale(0.8) translateY(30px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .container { position: relative; text-align: center; z-index: 10; width: 100%; max-width: 1200px; display: flex; flex-direction: column; align-items: center; }
        .header h1 { font-size: 58px; margin: 0; font-weight: 900; letter-spacing: -1px; }
        .header p { color: var(--accent-pink); text-transform: uppercase; letter-spacing: 6px; font-size: 14px; margin: 8px 0 0; font-weight: 700; }

        .wheel-outer { position: relative; width: min(620px, 90vw); height: min(620px, 90vw); margin: 20px auto 10px; animation: wheel-float 6s ease-in-out infinite; }
        
        /* Уменьшенный маркер */
        .marker {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent;
            border-top: 30px solid #FFF; z-index: 30; filter: drop-shadow(0 0 10px rgba(255,255,255,0.6));
        }

        canvas#wheel { width: 100%; height: 100%; border-radius: 50%; border: 15px solid #000; transition: transform 6s cubic-bezier(0.1, 0, 0, 1); }

        .spin-btn {
            margin-top: 20px; background: var(--accent-pink); color: white; border: none; padding: 20px 70px;
            font-size: 28px; font-weight: 900; border-radius: 100px; cursor: pointer;
            text-transform: uppercase; animation: btn-pulse 2s infinite ease-in-out;
            transition: all 0.3s ease;
        }
        .spin-btn:disabled { background: var(--btn-disabled) !important; animation: none !important; opacity: 0.5; }

        /* Блок "ВЫИГРЫШ" - без границ */
        .prize-block {
            margin-top: 30px;
            text-align: center;
            width: 100%;
            max-width: 600px;
            opacity: 0;
            transform: scale(0.8) translateY(30px);
            transition: all 0.5s ease;
        }
        
        .prize-block.show {
            opacity: 1;
            transform: scale(1) translateY(0);
            animation: prize-pop 0.6s cubic-bezier(0.17, 0.89, 0.32, 1.49);
        }
        
        .prize-label {
            font-size: 28px;
            font-weight: 400;
            color: rgba(255,255,255,0.8);
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(0,242,255,0.3);
        }
        
        .prize-value {
            font-size: 52px;
            font-weight: 900;
            color: #FFFFFF;
            text-transform: uppercase;
            text-shadow: 0 0 30px var(--accent-pink), 0 0 60px rgba(255,0,127,0.3);
            line-height: 1.2;
            word-break: keep-all;
            max-width: 100%;
            padding: 0 10px;
        }

        /* Окно регистрации */
        #regOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 200;
            display: none; justify-content: center; align-items: center;
            backdrop-filter: blur(12px); opacity: 0; transition: opacity 0.4s;
        }
        #regOverlay.active { display: flex; opacity: 1; }
        .reg-card {
            background: #16161f; padding: 40px; border-radius: 30px; border: 1px solid #333;
            width: 90%; max-width: 450px; text-align: center; position: relative;
        }
        .close-btn {
            position: absolute; top: 15px; right: 20px; font-size: 30px; color: #666;
            cursor: pointer; transition: color 0.3s; background: none; border: none;
        }
        .close-btn:hover { color: #fff; }
        .reg-card input { 
            background: #000; border: 1px solid #444; color: #fff; padding: 20px; border-radius: 15px; width: 100%; margin-bottom: 15px; font-size: 18px;
        }
        .reg-card input::placeholder {
            color: #666;
            opacity: 0.8;
        }
        .confirm-btn { background: var(--accent-blue); color: #000; border: none; width: 100%; padding: 20px; font-size: 20px; font-weight: 900; border-radius: 15px; cursor: pointer; text-transform: uppercase; }
        .error-message {
            color: #ff4444; font-size: 14px; margin-top: -10px; margin-bottom: 15px; display: none;
        }

        /* Админка */
        .admin-trigger { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; background: none; border: none; cursor: pointer; opacity: 0.3; z-index: 50; fill: #fff; transition: 0.3s; }
        .admin-trigger:hover { opacity: 1; transform: rotate(90deg); }
        #adminPanel { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #05050a; z-index: 1000; 
            display: none; flex-direction: column; padding: 40px; overflow-y: auto;
        }
        .admin-card { background: #16161f; padding: 25px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #333; width: 100%; max-width: 800px; margin-left: auto; margin-right: auto; }
        .history-table { width: 100%; border-collapse: collapse; }
        .history-table th, .history-table td { padding: 12px; border-bottom: 1px solid #222; text-align: left; }
        .settings-group { margin-bottom: 20px; }
        .settings-group label { display: block; margin-bottom: 8px; color: var(--accent-blue); }
        .settings-group input, .settings-group textarea { 
            width: 100%; padding: 12px; background: #000; border: 1px solid #444; 
            color: #fff; border-radius: 8px; font-size: 16px;
        }
        .prize-item { 
            display: flex; gap: 10px; margin-bottom: 10px; align-items: center;
            background: #1e1e2a; padding: 15px; border-radius: 10px;
        }
        .prize-item input[type="text"] { flex: 2; }
        .prize-item input[type="number"] { flex: 1; }
        .remove-prize { background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .add-prize { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        .export-btn { 
            background: var(--accent-blue); color: #000; border: none; padding: 12px 20px; 
            border-radius: 8px; cursor: pointer; font-weight: bold; margin-right: 10px;
        }
        .admin-actions { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    </style>
</head>
<body>

<div id="regOverlay">
    <div class="reg-card">
        <button class="close-btn" onclick="closeRegistration()">&times;</button>
        <h2 style="color:var(--accent-blue); font-size: 32px; margin-bottom: 10px;">ПОЧТИ ГОТОВО!</h2>
        <p style="opacity: 0.7; margin-bottom: 30px;">Введите данные, чтобы активировать колесо и сохранить выигрыш</p>
        <input type="text" id="uName" placeholder="Ваше ФИО">
        <input type="tel" id="uPhone" placeholder="+7 (___) ___-__-__">
        <div class="error-message" id="phoneError"></div>
        <button class="confirm-btn" onclick="validateAndSpin()">КРУТИТЬ КОЛЕСО</button>
    </div>
</div>

<div class="container">
    <div class="header">
        <h1>PAYG INSURE</h1>
        <p>SAFE MODE ACTIVATED</p>
    </div>
    
    <div class="wheel-outer" id="wheelCont">
        <div class="marker"></div>
        <canvas id="wheel" width="1200" height="1200"></canvas>
    </div>

    <button class="spin-btn" id="mainSpinBtn">ПОЕХАЛИ!</button>

    <!-- Блок "ВЫИГРЫШ" - две строки без границ -->
    <div class="prize-block" id="prizeBlock">
        <div class="prize-label">ВЫИГРЫШ</div>
        <div class="prize-value" id="prizeDisplay">—</div>
    </div>
</div>

<!-- Аудио элементы -->
<audio id="winAudio" preload="auto">
    <source src="https://actions.google.com/sounds/v1/foley/brass_fanfare_short.ogg" type="audio/ogg">
</audio>

<audio id="confettiSound" preload="auto">
    <source src="https://actions.google.com/sounds/v1/alarms/medium_bell_ringing_near.ogg" type="audio/ogg">
</audio>

<button class="admin-trigger" id="openAdmin">
    <svg viewBox="0 0 24 24"><path d="M12,15.5A3.5,3.5 0 0,1 8.5,12A3.5,3.5 0 0,1 12,8.5A3.5,3.5 0 0,1 15.5,12A3.5,3.5 0 0,1 12,15.5M19.43,12.97C19.47,12.65 19.5,12.33 19.5,12C19.5,11.67 19.47,11.35 19.43,11.03L21.54,9.37C21.73,9.22 21.78,8.95 21.66,8.73L19.66,5.27C19.54,5.05 19.27,4.96 19.05,5.05L16.56,6.05C16.04,5.66 15.47,5.34 14.86,5.12L14.47,2.44C14.43,2.2 14.22,2 14,2H10C9.78,2 9.57,2.2 9.53,2.44L9.14,5.12C8.53,5.34 7.96,5.66 7.44,6.05L4.95,5.05C4.73,4.96 4.46,5.05 4.34,5.27L2.34,8.73C2.21,8.95 2.27,9.22 2.46,9.37L4.57,11.03C4.53,11.35 4.5,11.67 4.5,12C4.5,12.33 4.53,12.65 4.57,12.97L2.46,14.63C2.27,14.78 2.21,15.05 2.34,15.27L4.34,18.73C4.46,18.95 4.73,19.03 4.95,18.95L7.44,17.94C7.96,18.34 8.53,18.66 9.14,18.88L9.53,21.56C9.57,21.8 9.78,22 10,22H14C14.22,22 14.43,21.8 14.47,21.56L14.86,18.88C15.47,18.66 16.04,18.34 16.56,17.94L19.05,18.95C19.27,19.03 19.54,18.95 19.66,18.73L21.66,15.27C21.78,15.05 21.73,14.78 21.54,14.63L19.43,12.97Z"/></svg>
</button>

<div id="adminPanel">
    <h1 style="color:#FFF">АДМИН-ПАНЕЛЬ</h1>
    
    <div class="admin-card">
        <h3>Настройка блоков</h3>
        <div class="settings-group">
            <label>Заголовок страницы</label>
            <input type="text" id="pageTitle" value="PAYG INSURE">
        </div>
        <div class="settings-group">
            <label>Подзаголовок</label>
            <input type="text" id="pageSubtitle" value="SAFE MODE ACTIVATED">
        </div>
        <div class="settings-group">
            <label>Текст на кнопке</label>
            <input type="text" id="btnText" value="ПОЕХАЛИ!">
        </div>
        <div class="settings-group">
            <label>Текст в окне регистрации (заголовок)</label>
            <input type="text" id="regTitle" value="ПОЧТИ ГОТОВО!">
        </div>
        <div class="settings-group">
            <label>Текст в окне регистрации (описание)</label>
            <textarea id="regDesc" rows="2">Введите данные, чтобы активировать колесо и сохранить выигрыш</textarea>
        </div>
        <button class="confirm-btn" onclick="saveBlockSettings()" style="margin-top: 10px;">Сохранить настройки блоков</button>
    </div>
    
    <div class="admin-card">
        <h3>Редактор секторов колеса</h3>
        <div id="prizeEditor"></div>
        <button class="add-prize" onclick="addPrizeField()">+ Добавить сектор</button>
        <button class="confirm-btn" onclick="savePrizes()" style="margin-top: 10px;">Сохранить сектора</button>
    </div>
    
    <div class="admin-card">
        <h3>База Лидов и История</h3>
        <div class="admin-actions">
            <button class="export-btn" onclick="exportLeads()">📥 Выгрузить базу лидов (CSV)</button>
            <button class="export-btn" onclick="exportLeads('json')">📥 Выгрузить как JSON</button>
        </div>
        <table class="history-table" id="logTable">
            <thead><tr><th>Имя</th><th>Телефон</th><th>Приз</th><th>Дата</th></tr></thead>
            <tbody></tbody>
        </table>
        <button onclick="clearData()" style="background:#dc3545; color:#fff; border:none; padding:10px; border-radius:8px; margin-top:15px; cursor:pointer">Очистить историю</button>
    </div>
    <button class="confirm-btn" onclick="document.getElementById('adminPanel').style.display='none'">Закрыть</button>
</div>

<script>
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const winAudio = document.getElementById('winAudio');
    const confettiSound = document.getElementById('confettiSound');
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    let config = JSON.parse(localStorage.getItem('wheelConfig')) || {
        prizes: [
            { name: "ТЫЩА МИНУТ", chance: 1 }, 
            { name: "СТИКЕРПАК", chance: 35 },
            { name: "ПУТЬ ЗА НОЛЬ", chance: 25 }, 
            { name: "ДВОЙНОЙ СЧЕТ", chance: 10 },
            { name: "ТВОЙ АМУЛЕТ", chance: 2 }, 
            { name: "ДРУЖСКИЙ СЕЙВ", chance: 7 },
            { name: "ЕЩЕ КРУЖОК", chance: 5 }, 
            { name: "ДЕНЬ БЕЗ ГРАНИЦ", chance: 15 }
        ]
    };

    let blockSettings = JSON.parse(localStorage.getItem('blockSettings')) || {
        pageTitle: "PAYG INSURE",
        pageSubtitle: "SAFE MODE ACTIVATED",
        btnText: "ПОЕХАЛИ!",
        regTitle: "ПОЧТИ ГОТОВО!",
        regDesc: "Введите данные, чтобы активировать колесо и сохранить выигрыш"
    };

    let isSpinning = false;
    let totalRot = 0;
    let lastIdx = -1;
    let currentUser = null;

    // Применение настроек блоков
    function applyBlockSettings() {
        document.querySelector('.header h1').textContent = blockSettings.pageTitle;
        document.querySelector('.header p').textContent = blockSettings.pageSubtitle;
        document.getElementById('mainSpinBtn').textContent = blockSettings.btnText;
        document.querySelector('#regOverlay h2').textContent = blockSettings.regTitle;
        document.querySelector('#regOverlay p').textContent = blockSettings.regDesc;
    }

    // Функция закрытия регистрационной формы
    window.closeRegistration = () => {
        const ov = document.getElementById('regOverlay');
        ov.classList.remove('active');
        setTimeout(() => {
            ov.style.display = 'none';
            document.getElementById('uName').value = '';
            document.getElementById('uPhone').value = '';
            document.getElementById('phoneError').style.display = 'none';
        }, 400);
    };

    // Маска для телефона
    document.getElementById('uPhone').addEventListener('input', function(e) {
        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,1})(\d{0,3})(\d{0,3})(\d{0,2})(\d{0,2})/);
        e.target.value = !x[2] ? x[1] : '+7 (' + x[2] + ') ' + (x[3] ? x[3] + '-' : '') + (x[4] ? x[4] + '-' : '') + (x[5] ? x[5] : '');
    });

    // Проверка уникальности телефона
    function isPhoneUnique(phone) {
        const logs = JSON.parse(localStorage.getItem('wheelLogs')) || [];
        const cleanPhone = phone.replace(/\D/g, '');
        return !logs.some(log => log.phone.replace(/\D/g, '') === cleanPhone);
    }

    function playTick() {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = 'sine'; o.frequency.setValueAtTime(600, audioCtx.currentTime);
        o.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.04);
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + 0.04);
    }

    function playConfettiSound() {
        // Создаем новый элемент Audio для каждого воспроизведения
        const sound = new Audio('https://actions.google.com/sounds/v1/alarms/medium_bell_ringing_near.ogg');
        sound.volume = 0.5;
        sound.play().catch(e => {
            // Если не удалось воспроизвести, пробуем через Web Audio API
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(400, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.5);
        });
    }

    function draw() {
        const cx = 600, cy = 600, r = 580;
        ctx.clearRect(0,0,1200,1200);
        const arc = (2 * Math.PI) / config.prizes.length;
        const matrix = new WebKitCSSMatrix(window.getComputedStyle(canvas).transform);
        const currentAngleRad = Math.atan2(matrix.b, matrix.a);

        config.prizes.forEach((p, i) => {
            const start = i * arc - (Math.PI / 2) - (arc / 2);
            ctx.beginPath();
            ctx.fillStyle = (i % 2 === 0) ? "#08080A" : "#121218";
            ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, start, start + arc); ctx.fill();
            ctx.strokeStyle = (i % 2 === 0) ? "#FF007F" : "#00F2FF";
            ctx.lineWidth = 10; ctx.stroke();

            const centerAngle = start + arc / 2 + currentAngleRad;
            const norm = Math.atan2(Math.sin(centerAngle), Math.cos(centerAngle));
            const active = Math.abs(norm + Math.PI/2) < (arc / 2);
            if (active && i !== lastIdx) { lastIdx = i; if (isSpinning) playTick(); }

            ctx.save();
            ctx.translate(cx, cy); ctx.rotate(start + arc / 2);
            ctx.textAlign = "right"; ctx.textBaseline = "middle";
            ctx.fillStyle = active ? "#FFF" : "rgba(255,255,255,0.2)";
            
            // Уменьшаем размер шрифта для длинных названий, но оставляем в одну строку
            let fontSize = 38;
            if (p.name.length > 10) {
                fontSize = 32;
            }
            if (p.name.length > 14) {
                fontSize = 28;
            }
            if (p.name.length > 18) {
                fontSize = 24;
            }
            
            ctx.font = `900 ${fontSize}px sans-serif`;
            ctx.fillText(p.name, r - 85, 0);
            ctx.restore();
        });
        ctx.beginPath(); ctx.arc(cx, cy, 70, 0, Math.PI*2); ctx.fillStyle="#000"; ctx.fill();
        ctx.strokeStyle="#FFF"; ctx.lineWidth=5; ctx.stroke();
    }

    document.getElementById('mainSpinBtn').onclick = () => {
        if (isSpinning) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const ov = document.getElementById('regOverlay');
        ov.style.display = 'flex';
        setTimeout(() => ov.classList.add('active'), 10);
    };

    function validateAndSpin() {
        const name = document.getElementById('uName').value;
        const phone = document.getElementById('uPhone').value;
        const errorEl = document.getElementById('phoneError');
        
        if(!name || !phone) {
            errorEl.textContent = "Пожалуйста, заполните все поля!";
            errorEl.style.display = 'block';
            return;
        }
        
        if(phone.replace(/\D/g,'').length !== 11) {
            errorEl.textContent = "Введите корректный номер телефона!";
            errorEl.style.display = 'block';
            return;
        }

        if(!isPhoneUnique(phone)) {
            errorEl.textContent = "Вы уже принимали участие в этом розыгрыше!";
            errorEl.style.display = 'block';
            return;
        }

        errorEl.style.display = 'none';
        currentUser = { name, phone };
        const ov = document.getElementById('regOverlay');
        ov.classList.remove('active');
        setTimeout(() => ov.style.display = 'none', 400);
        
        startSpin();
    }

    function startSpin() {
        isSpinning = true;
        document.getElementById('mainSpinBtn').disabled = true;
        document.getElementById('wheelCont').style.animation = 'none';
        
        // Скрываем блок с выигрышем
        const prizeBlock = document.getElementById('prizeBlock');
        prizeBlock.classList.remove('show');
        
        // Очищаем предыдущий результат
        document.getElementById('prizeDisplay').textContent = '—';

        const totalChance = config.prizes.reduce((a, b) => a + b.chance, 0);
        const rand = Math.random() * totalChance;
        let cum = 0, winIdx = 0;
        for (let i = 0; i < config.prizes.length; i++) {
            cum += config.prizes[i].chance;
            if (rand <= cum) { winIdx = i; break; }
        }

        const step = 360 / config.prizes.length;
        totalRot += 3960 + (360 - (winIdx * step)) + (360 - (totalRot % 360));
        canvas.style.transform = `rotate(${totalRot}deg)`;

        setTimeout(() => {
            isSpinning = false;
            document.getElementById('mainSpinBtn').disabled = false;
            document.getElementById('wheelCont').style.animation = 'wheel-float 6s ease-in-out infinite';
            
            const prize = config.prizes[winIdx].name;
            
            // Обновляем блок "ВЫИГРЫШ" и показываем его с анимацией
            document.getElementById('prizeDisplay').textContent = prize;
            prizeBlock.classList.add('show');
            
            // Воспроизводим звуки и конфетти
            winAudio.play().catch(e => console.log('Win audio failed:', e));
            playConfettiSound();
            
            // Запускаем конфетти несколько раз для лучшего эффекта
            confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 }, colors: ['#FF007F', '#00F2FF', '#FFFFFF'] });
            setTimeout(() => {
                confetti({ particleCount: 100, spread: 60, origin: { y: 0.5, x: 0.3 }, colors: ['#FF007F', '#00F2FF'] });
                confetti({ particleCount: 100, spread: 60, origin: { y: 0.5, x: 0.7 }, colors: ['#FF007F', '#00F2FF'] });
            }, 200);

            // Сохраняем в историю
            const logs = JSON.parse(localStorage.getItem('wheelLogs')) || [];
            logs.push({ ...currentUser, prize, time: new Date().toLocaleString() });
            localStorage.setItem('wheelLogs', JSON.stringify(logs));

            document.getElementById('uName').value = "";
            document.getElementById('uPhone').value = "";
        }, 6000);
    }

    // Админка - редактор призов
    function renderPrizeEditor() {
        const editor = document.getElementById('prizeEditor');
        editor.innerHTML = '';
        config.prizes.forEach((prize, index) => {
            const div = document.createElement('div');
            div.className = 'prize-item';
            div.innerHTML = `
                <input type="text" value="${prize.name}" placeholder="Название приза" data-index="${index}" data-field="name">
                <input type="number" value="${prize.chance}" placeholder="Шанс" data-index="${index}" data-field="chance" min="0" step="0.1">
                <button class="remove-prize" onclick="removePrize(${index})">Удалить</button>
            `;
            editor.appendChild(div);
        });
    }

    window.addPrizeField = () => {
        config.prizes.push({ name: "НОВЫЙ ПРИЗ", chance: 1 });
        renderPrizeEditor();
    };

    window.removePrize = (index) => {
        config.prizes.splice(index, 1);
        renderPrizeEditor();
    };

    window.savePrizes = () => {
        const inputs = document.querySelectorAll('#prizeEditor input');
        inputs.forEach(input => {
            const index = input.dataset.index;
            const field = input.dataset.field;
            if (config.prizes[index]) {
                config.prizes[index][field] = field === 'chance' ? parseFloat(input.value) || 0 : input.value;
            }
        });
        localStorage.setItem('wheelConfig', JSON.stringify(config));
        draw();
        alert('Сектора сохранены!');
    };

    window.saveBlockSettings = () => {
        blockSettings = {
            pageTitle: document.getElementById('pageTitle').value,
            pageSubtitle: document.getElementById('pageSubtitle').value,
            btnText: document.getElementById('btnText').value,
            regTitle: document.getElementById('regTitle').value,
            regDesc: document.getElementById('regDesc').value
        };
        localStorage.setItem('blockSettings', JSON.stringify(blockSettings));
        applyBlockSettings();
        alert('Настройки блоков сохранены!');
    };

    // Функция экспорта базы лидов
    window.exportLeads = (format = 'csv') => {
        const logs = JSON.parse(localStorage.getItem('wheelLogs')) || [];
        
        if (logs.length === 0) {
            alert('Нет данных для экспорта');
            return;
        }

        if (format === 'csv') {
            // Экспорт в CSV
            const headers = ['Имя', 'Телефон', 'Приз', 'Дата'];
            const csvContent = [
                headers.join(';'),
                ...logs.map(log => `${log.name};${log.phone};${log.prize};${log.time}`)
            ].join('\n');

            const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.setAttribute('download', 'leads_export.csv');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        } else {
            // Экспорт в JSON
            const jsonContent = JSON.stringify(logs, null, 2);
            const blob = new Blob([jsonContent], { type: 'application/json' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.setAttribute('download', 'leads_export.json');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }
    };

    function renderLogs() {
        const logs = JSON.parse(localStorage.getItem('wheelLogs')) || [];
        document.querySelector('#logTable tbody').innerHTML = logs.slice().reverse().map(l => 
            `<tr><td>${l.name}</td><td>${l.phone}</td><td>${l.prize}</td><td>${l.time}</td></tr>`
        ).join('');
    }

    document.getElementById('openAdmin').onclick = () => { 
        renderLogs(); 
        renderPrizeEditor();
        // Загружаем текущие настройки блоков в поля
        document.getElementById('pageTitle').value = blockSettings.pageTitle;
        document.getElementById('pageSubtitle').value = blockSettings.pageSubtitle;
        document.getElementById('btnText').value = blockSettings.btnText;
        document.getElementById('regTitle').value = blockSettings.regTitle;
        document.getElementById('regDesc').value = blockSettings.regDesc;
        document.getElementById('adminPanel').style.display = 'flex'; 
    };
    
    window.clearData = () => { 
        if(confirm("Очистить базу лидов?")) { 
            localStorage.removeItem('wheelLogs'); 
            renderLogs(); 
        } 
    };

    function loop() { draw(); requestAnimationFrame(loop); }
    
    // Инициализация
    applyBlockSettings();
    loop();
</script>
</body>
</html>
